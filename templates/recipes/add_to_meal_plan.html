{% extends 'base.html' %}

{% block title %}Add to Meal Plan - Foodie{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h3>Add "{{ recipe.title }}" to Meal Plan</h3>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <input type="hidden" name="week_start" value="{{ week_start|date:'Y-m-d' }}">
                        
                        <div class="mb-3">
                            <label for="day" class="form-label">Day</label>
                            <select name="day" id="day" class="form-select" required>
                                {% for day_num, day_name in days %}
                                <option value="{{ day_num }}">{{ day_name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label for="meal_type" class="form-label">Meal Type</label>
                            <select name="meal_type" id="meal_type" class="form-select" required>
                                {% for meal in meal_types %}
                                <option value="{{ meal }}">{{ meal|title }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <div class="mt-3">
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-plus"></i> Add to Meal Plan
                            </button>
                            <a href="{% url 'recipe_detail' recipe.id %}" class="btn btn-secondary">
                                <i class="fas fa-times"></i> Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
