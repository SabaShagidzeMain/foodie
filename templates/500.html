{% extends 'base.html' %}

{% block title %}Server Error - Foodie{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="display-1 text-muted">500</div>
            <h1 class="display-4 mb-4">Server Error</h1>
            <p class="lead text-muted mb-4">Something went wrong on our end. Please try again later.</p>
            <p class="text-muted small mb-4">We've been notified and are working on fixing the issue.</p>
            <a href="{% url 'recipes:recipe_list' %}" class="btn btn-primary">
                <i class="fas fa-home"></i> Go Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
